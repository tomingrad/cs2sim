<!doctype html>
<html lang="cs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CS2 Otevírací Simulátor</title>
<link href="https://fonts.googleapis.com/css2?family=Radio+Canada+Big:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
<link rel="icon" href="assets/image/favicon.png">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="history-container" style="margin-bottom: 20px; width: 100%;">
  <div class="top-history" id="topHistory" role="status" aria-live="polite" style="min-height: 40px; display: flex; align-items: center; justify-content: center; gap: 10px; overflow-x: auto; width: 100%;">
    
    <div id="historyPlaceholder" style="color: var(--muted); font-size: 13px; font-style: italic; white-space: nowrap;">
      — tady se zobrazí historie otevřených předmětů —
    </div>

  </div>
</div>

<canvas id="particlesCanvas"></canvas>

<div class="page-container">
  <header style="display:flex; justify-content:space-between; align-items:center; margin: 16px 0">
    <h1 style="margin: 0; font-size: 36px;">CS2 Otevírací Simulátor <span style="font-weight:400; font-size:18px; color:var(--accent)">XD gamba</span></h1>
    <button onclick="router.go('home')" class="btn" id="backBtn" style="background:var(--panel); border:1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 6px;">
      <img src="assets/image/icon/back.png" class="filter-icon"> 
      <span>Zpět na hlavní stránku</span>
    </button>
    <button id="muteBtn" onclick="audio.toggleMute()" class="btn" style="background:var(--panel); border:1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 6px;">
      <img id="muteBtnIcon" src="assets/image/icon/sound_on.png" class="filter-icon">
      <span id="muteBtnText">Zvuk zapnutý</span>
    </button>
  </header>

  <main id="view-home">
    <div style="margin-bottom:20px">
      <input type="text" id="searchInput" placeholder="Vyhledat bednu, skin nebo samolepku... (nebo '#' pro hledání podle štítků)" style="width:100%; padding:15px; border-radius:12px; border:1px solid var(--border); background:var(--panel); color:var(--text); font-family: 'Radio Canada Big', sans-serif;">
    </div>
    <div class="filter-container" style="margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap;">
  <label class="filter-chip">
    <input type="checkbox" id="filterAll" checked onchange="handleAllFilterChange()">
    <span class="chip-label">
      <img src="assets/image/icon/all.png" class="filter-icon"> Vše
    </span>
  </label>
  <label class="filter-chip">
    <input type="checkbox" value="case" checked onchange="handleFilterChange()">
    <span class="chip-label">
      <img src="assets/image/icon/case.png" class="filter-icon"> Bedny
    </span>
  </label>
  <label class="filter-chip">
    <input type="checkbox" value="package" checked onchange="handleFilterChange()">
    <span class="chip-label">
      <img src="assets/image/icon/package.png" class="filter-icon"> Balíčky
    </span>
  </label>
  <label class="filter-chip">
    <input type="checkbox" value="capsule" checked onchange="handleFilterChange()">
    <span class="chip-label">
      <img src="assets/image/icon/capsule.png" class="filter-icon"> Kapsle
    </span>
  </label>
  <label class="filter-chip">
    <input type="checkbox" value="collection" checked onchange="handleFilterChange()">
    <span class="chip-label">
      <img src="assets/image/collection/assault.png" class="filter-icon"> Kolekce
    </span>
  </label>
  
  <button id="sortBtn" onclick="toggleSort()" class="btn" style="background:var(--panel); border:1px solid var(--border); padding: 8px 16px; margin-left: auto; display: flex; align-items: center; gap: 6px;">
    <img src="assets/image/icon/sort.png" class="filter-icon" alt="Řazení"> 
    <span id="sortBtnText">Seřazeno od nejnovějších</span>
  </button>
</div>
    <div id="casesGrid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap:20px"></div>
  </main>

  <main id="view-case" style="display:none">
    <h1 id="caseTitle" style="margin:0;text-align:center;">Jméno bedny</h1>
    <p id="caseSubtitle" style="color:var(--muted);margin-bottom:20px;text-align:center;">Popisek bedny</p>

    <div id="spinnersContainer" class="spinners-container"></div>

    <div class="controls-row">
      <div class="spin-counter" id="counterGroup">
        <button class="counter-btn" id="decBtn" disabled>−</button>
        <span style="font-weight:800; min-width:20px; text-align:center" id="countVal">1</span>
        <button class="counter-btn" id="incBtn">+</button>
      </div>
      <button id="openBtn" class="btn">Otevřít bednu</button>
    </div>

    <div class="case-content-area">
      <h2>Obsahuje jeden z následujících předmětů:</h2>
      <div id="dropGrid" class="drop-grid"></div>
    </div>
  </main>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 style="margin-top:0; font-size: 32px;">Získané předměty</h2>
    <div id="resultsList" class="results-list"></div>
    <button onclick="closeModal()" class="btn btn-red" style="width:100%; margin-top:10px">Zavřít</button>
  </div>
</div>

<script src="cases.js"></script>

<script>
/** -------------------------
 * AUDIO & PARTICLES
 * ------------------------- */
const audio = {
  ctx: null,
  muted: localStorage.getItem('muted') === 'true',
  lastTick: 0,
  cache: {},

  init() {
  if (!this.ctx) {
    this.ctx = new (window.AudioContext || window.webkitAudioContext)();
  }

  const sounds = {
  case_tick: 'assets/sound/case_tick.wav',
  item_open: 'assets/sound/item_open.wav',
  capsule_tick: 'assets/sound/capsule_tick.wav',
  capsule_start: 'assets/sound/capsule_unlock_start.wav',
  menu_case_open: 'assets/sound/menu_case_open.wav',
  menu_back: 'assets/sound/menu_back.wav',
  menu_filter_change: 'assets/sound/menu_filter_change.wav'
  };

  for (const [key, path] of Object.entries(sounds)) {
    if (!this.cache[key]) {
      const a = new Audio();
      // Povolení stahování z jiného serveru
      a.crossOrigin = "anonymous"; 
      a.src = path;
      a.volume = 0.4;
      a.load();
      this.cache[key] = a;
    }
  }
},

  playMenuSelect() {
    if (this.muted) return;
    
    if (!this.ctx) this.init();

    const sound = this.cache['menu_case_open'];
    if (sound) {
      const s = sound.cloneNode();
      s.volume = 0.15; 
      s.play().catch(() => {});
    }
  },

  playMenuBack() {
    if (this.muted) return;
    if (!this.ctx) this.init();

    const sound = this.cache['menu_back'];
    if (sound) {
      const s = sound.cloneNode();
      s.volume = 0.2;
      s.play().catch(() => {});
    }
  },

  playMenuFilterChange() {
    if (this.muted) return;
    if (!this.ctx) this.init();

    const now = Date.now();
    if (now - this.lastTick < 60) return; 
    this.lastTick = now;

    const sound = this.cache['menu_filter_change'];
    if (sound) {
      const s = sound.cloneNode();
      s.volume = 0.2;
      s.play().catch(() => {});
    }
  },

  playStart() {
    if (this.muted) return;
    
    const soundKey = 'capsule_start';

    const sound = this.cache[soundKey];
    if (sound) {
      const s = sound.cloneNode();
      s.volume = 0.2;
      s.play().catch(() => {});
    }
  },

  playTick() {
    if (this.muted) return;
    const now = Date.now();
    if (now - this.lastTick < 40) return; 
    this.lastTick = now;

    // Výběr zvuku podle typu bedny
    let soundKey = 'case_tick';
    if (state.activeCase && state.activeCase.type === 'capsule' || state.activeCase.type === 'collection') {
      soundKey = 'capsule_tick';
    }

    const sound = this.cache[soundKey];
    if (sound) {
      //cloneNode() - přehrát zvuk vícekrát přes sebe
      const playClone = sound.cloneNode();
      playClone.volume = 0.1;
      playClone.play().catch(() => {});
    }
  },

  playReveal() {
    if (this.muted) return;

    const soundKey = 'item_open';

    const sound = this.cache[soundKey];
    if (sound) {
      const playClone = sound.cloneNode();
      playClone.volume = 0.2;
      playClone.play().catch(() => {});
    }
  },

  toggleMute() {
  this.muted = !this.muted;
  
  const btnText = document.getElementById('muteBtnText');
  const btnIcon = document.getElementById('muteBtnIcon');

  if (this.muted) {
    if (btnText) btnText.innerText = 'Zvuk vypnutý';
    if (btnIcon) btnIcon.src = 'assets/image/icon/sound_off.png';
  } else {
    if (btnText) btnText.innerText = 'Zvuk zapnutý';
    if (btnIcon) btnIcon.src = 'assets/image/icon/sound_on.png';
    audio.playMenuBack();
    }
  }
};

// Logika particles
const particles = {
  canvas: document.getElementById('particlesCanvas'),
  ctx: document.getElementById('particlesCanvas').getContext('2d'),
  list: [],
  init() {
    this.canvas.width = window.innerWidth;
    this.canvas.height = window.innerHeight;
    this.loop();
  },
  spinBurst(x, y, w, h) {
  const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent').trim() || '#00aeff';
  
  for (let i = 0; i < 250; i++) {
    this.list.push({
      x: x + (Math.random() - 0.5) * w * 5,
      y: y + (Math.random() - 0.5) * h * 1.5,
      color: accentColor,
      vx: -(Math.random() * 25 + 10), 
      vy: (Math.random() - 0.5) * 0.5,
      size: Math.random() * 3 + 3,
      life: 3.0, 
      decay: Math.random() * 0.02 + 0.01,
      noGravity: true
    });
  }
},
  burst(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      this.list.push({
        x, y, color,
        vx: (Math.random() - 0.5) * 24,
        vy: (Math.random() - 0.5) * 12 - 4,
        size: Math.random() * 8 + 4,
        life: 10,
        decay: Math.random() * 0.02 + 0.01,
        noGravity: false, 
        angle: Math.random() * Math.PI * 2,
        av: (Math.random() - 0.5) * 0.2
      });
    }
  },
  loop() {
  this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
  this.list = this.list.filter(p => {
    p.x += p.vx; 
    p.y += p.vy; 
    if (!p.noGravity) p.vy += 0.1;
    
    if (p.angle !== undefined) p.angle += p.av; 
    
    p.life -= p.decay;
    if (p.life <= 0) return false;

    this.ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
    this.ctx.fillStyle = p.color;

    this.ctx.save();
    this.ctx.translate(p.x, p.y);
    this.ctx.rotate(p.angle || 0);
    
    this.ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size);
    
    this.ctx.restore();
    
    return true;
  });
  requestAnimationFrame(() => this.loop());
  },
  clear(){
    this.list = [];
  }
};

/** -------------------------
 * SPINNER
 * ------------------------- */

 function calculateMissingOdds() {
  const TIER_WEIGHTS = {
    'gray':       15625,
    'lightblue':  3125,
    'blue':       625,
    'purple':     125,
    'pink':       25,
    'red':        5,
    'gold':       2
  };

  DATA.cases.forEach(c => {
    const needsCalc = c.items.some(it => it.odds === undefined);
    if (!needsCalc) return;

    const rarityCounts = {};
    c.items.forEach(it => {
      if (!rarityCounts[it.rarity]) rarityCounts[it.rarity] = 0;
      rarityCounts[it.rarity]++;
    });

    let totalBoxWeight = 0;
    for (const [rarity, count] of Object.entries(rarityCounts)) {
      if (TIER_WEIGHTS[rarity]) {
        totalBoxWeight += TIER_WEIGHTS[rarity];
      }
    }

    c.items.forEach(it => {
      if (it.odds === undefined && TIER_WEIGHTS[it.rarity]) {
        const groupOdds = TIER_WEIGHTS[it.rarity] / totalBoxWeight;
        let rawItemOdds = groupOdds / rarityCounts[it.rarity];
        let percent = rawItemOdds * 100;
        percent = parseFloat(percent.toFixed(2));
        it.odds = percent / 100;
      }
    });
  });
}
calculateMissingOdds();

class Spinner {
  constructor(id, items) {
    this.id = id; 
    this.pool = items;
    this.items = []; 
    this.offset = 0; 
    this.raf = null;
    this.slotW = 160; 
    this.lastTickIdx = -1;
  }

  mount(parent) {
    const div = document.createElement('div');
    div.className = 'spinner-instance';
    div.innerHTML = `<div class="spinner-marker"></div><canvas class="spin-canvas" id="cvs-${this.id}"></canvas>`;
    parent.appendChild(div);
    this.canvas = div.querySelector('canvas');
    this.ctx = this.canvas.getContext('2d');
    this.resize(); 
    this.reset();
  }

  resize() {
    this.canvas.width = this.canvas.parentElement.offsetWidth;
    this.canvas.height = this.canvas.parentElement.offsetHeight;
  }

  // Realistickej spinner
  _getFillerItem(pool) {
    const totalWeight = pool.reduce((sum, it) => sum + it.odds, 0);
    const r = Math.random() * totalWeight;
    
    let acc = 0;
    let selected = pool[0];

    for (const it of pool) {
      acc += it.odds;
      if (r <= acc) {
        selected = it;
        break;
      }
    }
    
    const itemCopy = { ...selected };
    
    // StatTrak
    if (state.activeCase && state.activeCase.type === 'case') {
        if (Math.random() < 0.1) {
            itemCopy.name = "StatTrak™ " + itemCopy.name;
        }
    }
    
    return itemCopy;
  }

  reset() {
    this.offset = 0;
    this.lastTickIdx = -1;

    const commonPool = state.activeCase.items.filter(item => item.rarity !== 'gold');
    const pool = commonPool.length > 0 ? commonPool : state.activeCase.items;

    for (let i = 0; i < 100; i++) {
      this.items[i] = this._getFillerItem(pool);
    }

    this.draw();
  }

  // Určení výherního předmětu
drawItem() {
    const r = Math.random();
    let acc = 0;
    let selectedItem = null;
    
    for (const i of this.pool) { 
      acc += i.odds; 
      if (r <= acc) {
        selectedItem = { ...i }; 
        break;
      }
    }

    if (!selectedItem) selectedItem = { ...this.pool[0] };

    selectedItem.isStatTrak = false; // Výchozí stav
    if (state.activeCase && state.activeCase.type === 'case') {
      if (Math.random() < 0.1) {
        selectedItem.isStatTrak = true;
        
        if (selectedItem.rarity !== 'gold') {
          selectedItem.name = "StatTrak™ " + selectedItem.name;
        }
      }
    }
    
    return selectedItem;
  }

  draw() {
    const {ctx, canvas, items, offset, slotW} = this;
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    items.forEach((it, i) => {
      const x = i * slotW - offset;
      if (x + slotW < 0 || x > canvas.width) return;
      
      const rarityData = DATA.rarities[it.rarity] || { color: 'var(--text)' };
      const color = rarityData.color;
      
      const grad = ctx.createLinearGradient(0, canvas.height, 0, 0);
      grad.addColorStop(0, color + '44');
      grad.addColorStop(0.5, color + '11');
      grad.addColorStop(1, 'transparent');

      ctx.fillStyle = grad;
      ctx.fillRect(x + 4, 10, slotW - 8, canvas.height - 20);
      
      ctx.fillStyle = color; 
      ctx.fillRect(x + 4, canvas.height - 14, slotW - 8, 4);

      if (it.image) {
        if (!it._imgObj) {
          it._imgObj = new Image();
          it._imgObj.src = it.image;
          it._imgObj.onload = () => this.draw();
        }
        
        if (it._imgObj.complete) {
          const targetH = 82; 
          const aspect = it._imgObj.naturalWidth / it._imgObj.naturalHeight;
          const finalW = targetH * aspect;
          
          const imgX = x + (slotW - finalW) / 2;
          const imgY = (canvas.height - targetH) / 2;

          ctx.save();
          ctx.filter = 'blur(15px)';
          ctx.globalAlpha = 0.3;
          
          ctx.drawImage(
            it._imgObj, 
            imgX, 
            imgY,
            finalW, 
            targetH
          );
          
          ctx.restore();

          ctx.drawImage(
            it._imgObj, 
            imgX, 
            imgY, 
            finalW, 
            targetH
          );
        }
      } else {
        ctx.font = '36px Arial';
        let icon = '🔫';
        if (it.name.includes('★')) icon = '🔪';
        else if (state.activeCase && (state.activeCase.type === 'capsule' || it.name.includes('Samolepka'))) icon = '🏷️';
        else if (state.activeCase && state.activeCase.type === 'package') icon = '📦';
        
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        
        ctx.shadowColor = color;
        ctx.shadowBlur = 20;
        
        ctx.fillStyle = 'var(--text)';
        ctx.fillText(icon, x + slotW / 2, canvas.height / 2);
        
        ctx.shadowBlur = 0;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'alphabetic';
      }
    });
}

  stop() {
    if (this.raf) {
      cancelAnimationFrame(this.raf);
      this.raf = null;
    }
  }

async spin(winner) {
  const winIdx = 60;
  const commonPool = state.activeCase.items.filter(it => it.rarity !== 'gold');
  const poolToUse = commonPool.length > 0 ? commonPool : state.activeCase.items;

  for (let i = 0; i < 100; i++) {
    this.items[i] = this._getFillerItem(poolToUse);
  }
  this.items[winIdx] = winner;

  const target = winIdx * this.slotW - (this.canvas.width / 2) + (this.slotW / 2) + (Math.random() * 60 - 30);
  const start = performance.now();
  this.duration = 8500 + Math.random() * 1000;

  return new Promise(res => {
    const step = (now) => {
      
      if (state.isSkipping) {
        this.offset = target;
        this.draw();
        this.raf = null;
        return res(winner);
      }

      const p = Math.min((now - start) / this.duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      this.offset = ease * target;

      const curIdx = Math.floor((this.offset + this.canvas.width / 2) / this.slotW);
      if (curIdx !== this.lastTickIdx) {
        audio.playTick(this);
        this.lastTickIdx = curIdx;
      }

      this.draw();

      if (p < 1) {
        this.raf = requestAnimationFrame(step);
      } else {
        this.raf = null;
        res(winner);
      }
    };
    this.raf = requestAnimationFrame(step);
  });
}
}

/** -------------------------
 * STATE & ACTIONS
 * ------------------------- */
const state = {
  isSpinning: false,
  openCount: 1,
  instances: [],
  activeCase: null,
  lastResults: [],
  sortOrder: 'desc'
};

const monthMap = {
  ledna: 0, února: 1, března: 2, dubna: 3, května: 4, června: 5,
  července: 6, srpna: 7, září: 8, října: 9, listopadu: 10, prosince: 11
};

// Převod čísel na měsíce (filtr)
function parseReleaseDate(dateStr) {
  if (!dateStr || dateStr === 'Neznámé') return 0;
  const parts = dateStr.replace('.', '').split(' ');
  const day = parseInt(parts[0]);
  const month = monthMap[parts[1]] || 0;
  const year = parseInt(parts[2]);
  return new Date(year, month, day).getTime();
}

const router = {
  go(view, id) {
    window.scrollTo(0, 0);
    if (view === 'home' && state.isSpinning) {
      state.isSpinning = false;
      state.isSkipping = false;
      state.instances.forEach(s => s.stop());

      document.getElementById('openBtn').disabled = false; 
      document.getElementById('incBtn').disabled = false;
      document.getElementById('decBtn').disabled = false;
    }
    
    if (view === 'home') {
      if (state.activeCase) {
        audio.playMenuBack();
        particles.clear();
      }
      handleFilterChange();
    }

    document.getElementById('view-home').style.display = view === 'home' ? 'block' : 'none';
    document.getElementById('view-case').style.display = view === 'case' ? 'block' : 'none';
    document.querySelector('header h1').style.display = view === 'home' ? 'block' : 'none';
    
    const backBtn = document.querySelector('#backBtn');
    if (backBtn) {
      backBtn.style.display = view === 'home' ? 'none' : 'flex';
    }

    if (view === 'case') {
      const searchInput = document.getElementById('searchInput');
      
      state.activeCase = DATA.cases.find(c => c.id === id);

      const titleEl = document.getElementById('caseTitle');
      
      titleEl.style.position = 'relative';
      titleEl.style.display = 'flex';
      titleEl.style.justifyContent = 'center';
      titleEl.style.alignItems = 'center';
      titleEl.style.overflow = 'visible';
      titleEl.style.zIndex = '1';

      let bgLayer = '';
      if (state.activeCase.image) {
        bgLayer = `
          <img src="${state.activeCase.image}" 
               style="
                 position: absolute;
                 top: 50%;
                 left: 50%;
                 transform: translate(-50%, -40%);
                 width: 300px;
                 height: auto;
                 opacity: 0.3;
                 filter: blur(10px);
                 z-index: -1;
                 pointer-events: none;
               ">
        `;
      }

      const textLayer = `
        <span style="
          position: relative; 
          z-index: 2; 
          text-shadow: 0 0px 30px rgba(0,0,0,0.8);
        ">
          ${state.activeCase.name}
        </span>
      `;

      titleEl.innerHTML = bgLayer + textLayer;

      const isCollection = state.activeCase.type === 'collection';

      audio.playMenuSelect();
      
      document.getElementById('caseSubtitle').innerHTML = `
        ${!isCollection ? `
          <span>Bedna série č. <span style="color:var(--text)">${state.activeCase.series || 'Neznámé'}</span>,</span>
        ` : ''}
          <span>Datum vydání: <span style="color:var(--text)">${state.activeCase.release || 'Neznámý'}</span></span>
      `;

      this.initSpinners();
      this.renderDropTable();
    }
    updateCounterUI();
  },

  initSpinners() {
    const container = document.getElementById('spinnersContainer');
    container.innerHTML = ''; 
    state.instances = [];
    for (let i=0; i < state.openCount; i++) {
      const s = new Spinner(i, state.activeCase.items);
      s.mount(container); 
      state.instances.push(s);
    }
  },

renderDropTable() {
  const grid = document.getElementById('dropGrid');
  if (!state.activeCase) return;

  grid.innerHTML = state.activeCase.items.map(it => {
    const rarityData = DATA.rarities[it.rarity];
    const color = rarityData.color;

    let imageHtml = '';
    if (it.image) {
      imageHtml = `<img src="${it.image}" style="width: 100px; height: auto; filter: drop-shadow(0 0 3px rgba(0,0,0,0.3));">`;
    }

    const chance = (it.odds * 100).toFixed(4).replace(/\.?0+$/, '') + '%';
    const [weaponName, skinName] = it.name.includes('|') ? it.name.split('|').map(s => s.trim()) : [it.name, ''];

    let finalSkinName = skinName;
    if (it.link && skinName.includes(': ')) {
      const parts = skinName.split(': '); 
      finalSkinName = `${parts[0]}: <a href="${it.link}" target="_blank" style="color: #fff; text-decoration: underline; position: relative; z-index: 10;">${parts[1]}</a>`;
    }

    return `<div class="drop-card" style="width: 140px; display: flex; flex-direction: column; gap: 6px;">
  
    <div class="drop-card-visual" style="position: relative; width: 100%; height: 100px; background: linear-gradient(0deg, ${color}22 0%, rgba(0,0,0,0) 100%); border-bottom: 4px solid ${color}; display: flex; align-items: center; justify-content: center; padding: 4px; overflow: hidden;">
    <div style="position: absolute; top: 10px; left: 14px; width: 80%; height: 80%; background: url('${it.image}') center/contain no-repeat; filter: blur(15px); opacity: 0.2; z-index: 0;"></div>

    <div class="drop-card-odds" style="position: absolute; top: 4px; left: 4px; font-size: 10px; font-weight: 800; color: ${color}; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 2;">
      ${chance}
    </div>

    <div style="width: 90%; height: 90%; display: flex; align-items: center; justify-content: center; z-index: 1, position: relative;">
      ${imageHtml.replace('style="', 'style="max-width: 100%; max-height: 100%;')}
    </div>
  </div>

  <div class="drop-card-info" style="text-align: left;">
    <div style="font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
      ${weaponName}
    </div>
    <div style="font-size: 12px; font-weight: 400; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
      ${finalSkinName}
    </div>
  </div>
  </div>`;
    }).join('');
  }
}

function handleAllFilterChange() {
  const allCheckbox = document.getElementById('filterAll');
  const otherCheckboxes = document.querySelectorAll('.filter-chip input:not(#filterAll)');
  
  otherCheckboxes.forEach(cb => {
    cb.checked = allCheckbox.checked;
  });
  
  handleFilterChange();
}

function toggleSort() {
  state.sortOrder = state.sortOrder === 'desc' ? 'asc' : 'desc';
  
  const btnText = document.getElementById('sortBtnText');
  if (btnText) {
    btnText.innerText = state.sortOrder === 'desc' 
      ? 'Seřazeno od nejnovějších' 
      : 'Seřazeno od nejstarších';
  }
  
  handleFilterChange();
}

function handleFilterChange() {
  const allCheckbox = document.getElementById('filterAll');
  const otherCheckboxes = Array.from(document.querySelectorAll('.filter-chip input:not(#filterAll)'));

  audio.playMenuFilterChange();

  const allOthersChecked = otherCheckboxes.every(cb => cb.checked);
  const someOthersUnchecked = otherCheckboxes.some(cb => !cb.checked);

  if (allOthersChecked) allCheckbox.checked = true;
  else if (someOthersUnchecked) allCheckbox.checked = false;

  const rawSearchTerm = document.getElementById('searchInput').value.toLowerCase();
  const activeTypes = otherCheckboxes.filter(cb => cb.checked).map(cb => cb.value);

  let normalSearch = rawSearchTerm;
  let tagSearch = "";

  if (rawSearchTerm.includes('#')) {
    const parts = rawSearchTerm.split('#');
    normalSearch = parts[0].trim();
    tagSearch = parts[1].trim();
  }

  let filtered = DATA.cases.filter(c => {
    const matchesType = activeTypes.includes(c.type);
    
    const matchesName = normalSearch === "" || 
                        c.name.toLowerCase().includes(normalSearch) || 
                        c.items.some(it => it.name.toLowerCase().includes(normalSearch));
    
    let matchesTags = true;
    if (tagSearch !== "") {
      if (c.tags && Array.isArray(c.tags)) {
        matchesTags = c.tags.some(tag => tag.toLowerCase().includes(tagSearch));
      } else {
        matchesTags = false;
      }
    }

    return matchesType && matchesName && matchesTags;
  });

  filtered.sort((a, b) => {
    const dateA = parseReleaseDate(a.release);
    const dateB = parseReleaseDate(b.release);
    return state.sortOrder === 'desc' ? dateB - dateA : dateA - dateB;
  });

  renderCases(filtered);
}

document.getElementById('searchInput').addEventListener('input', handleFilterChange);

function resetFilters() {
  const searchInput = document.getElementById('searchInput');
  if (searchInput) searchInput.value = '';

  const allCheckbox = document.getElementById('filterAll');
  if (allCheckbox) {
    allCheckbox.checked = true;
    handleAllFilterChange();
  } else {
    renderCases(DATA.cases);
  }
}

async function handleOpen() {
  if (state.isSpinning) {
    state.isSkipping = true;
    return;
  }

  audio.playStart();
  state.isSpinning = true;
  state.isSkipping = false;

  const openBtn = document.getElementById('openBtn');
  openBtn.innerText = "Přeskočit";
  openBtn.classList.add('btn-red');

  if(document.getElementById('incBtn')) document.getElementById('incBtn').disabled = true;
  if(document.getElementById('decBtn')) document.getElementById('decBtn').disabled = true;

  const allSpinners = document.querySelectorAll('.spin-canvas');
  allSpinners.forEach(spinner => {
    const rect = spinner.getBoundingClientRect();
    if (particles && typeof particles.spinBurst === 'function') {
      particles.spinBurst(
        rect.left + rect.width / 2, 
        rect.top + rect.height / 2, 
        rect.width, 
        rect.height * 0.3
      );
    }
  });
  
  const rolledWinners = [];
  const promises = state.instances.map(s => {
    s.reset();
    const winningItem = s.drawItem();
    rolledWinners.push(winningItem);
    return s.spin(winningItem);
  });

  try {
    await Promise.all(promises);

    let results = rolledWinners.map(item => {
      if (item.rarity === 'gold' && item.knives && DATA.knifeCollections[item.knives]) {
        const pool = DATA.knifeCollections[item.knives];
        const randomKnife = pool[Math.floor(Math.random() * pool.length)];
        const wasStatTrak = item.isStatTrak === true;
        const min = randomKnife.minFloat !== undefined ? randomKnife.minFloat : 0;
        const max = randomKnife.maxFloat !== undefined ? randomKnife.maxFloat : 1;
        
        return { 
          ...item, 
          ...randomKnife, 
          isStatTrak: wasStatTrak,
          float: Math.random() * (max - min) + min,
          pattern: Math.floor(Math.random() * 1000) + 1,
          name: wasStatTrak ? `StatTrak™ ${randomKnife.name}` : randomKnife.name
        };
      }
      return item;
    });

    if (!state.isSpinning) return;

    state.lastResults = results;
    audio.playReveal();
    showResultsModal();
    state.lastResults.forEach(r => addHistory(r));
    
  } catch (err) {
    console.error("Chyba při otevírání:", err);
  } finally {
    state.isSpinning = false;
    state.isSkipping = false;
    updateCounterUI();
  }
}

function addHistory(it) {
  const container = document.getElementById('topHistory');
  const placeholder = document.getElementById('historyPlaceholder');
  
  if (placeholder) {
    placeholder.remove();
    container.style.justifyContent = 'flex-start';
  }

  const node = document.createElement('div');
  node.className = 'history-node';
  
  const isPackage = state.activeCase && state.activeCase.type === 'package';
  const souvenirPrefix = isPackage ? '<span style="color:#ffd700; font-weight:bold">Souvenir</span>' : '';

  node.innerHTML = `
    <span style="color:${DATA.rarities[it.rarity].color}">●</span> 
    ${souvenirPrefix}${it.name}
  `;
  
  node.classList.add('new-item');
  setTimeout(() => node.classList.remove('new-item'), 1000);

  container.prepend(node);

  if (container.children.length > 30) {
    container.lastElementChild.remove();
  }
}

function renderCases(filteredData) {
  const grid = document.getElementById('casesGrid');
  
  if (filteredData.length === 0) {
    grid.innerHTML = `
      <div style="grid-column: 1 / -1; text-align: center; padding: 50px 20px; color: var(--muted);">
        <img src="assets/image/icon/warning.png" style="width:80px; height: auto">
        <h2 style="color: var(--text); margin-bottom: 10px;">Není tu nic k zobrazení</h2>
        <p style="margin-bottom: 20px;">Pravděpodobně je vyhledávací výraz špatně nebo jsou všechny filtry vypnuté</p>
        <button class="btn" id="resetBtn" onclick="resetFilters()">Resetovat filtry</button>
      </div>
    `;
    return;
  }

  grid.innerHTML = filteredData.map(c => {
    let visualContent = '';
    
    if (c.image) {
      // Nastavení obrázku z dat předmětu
      visualContent = `<img src="${c.image}" alt="${c.name}" style="width: 90px; height: 70px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 0px 18px rgba(0,0,0,0.3));">`;
    } else {
      // Fallback na emoji když neni obrázek
      let emoji = '📦';
      if (c.type === 'case') emoji = '🧰';
      else if (c.type === 'package') emoji = '📦';
      else if (c.type === 'capsule') emoji = '✉️';
      else if (c.type === 'collection') emoji = '🎁';
      visualContent = `<div style="font-size:40px; margin-bottom:10px">${emoji}</div>`;
    }

    const newClass = c.new === true ? 'is-new' : '';

    const searchVal = document.getElementById('searchInput').value;
    const isTagSearch = searchVal.includes('#');
    let tagsHtml = '';

    if (isTagSearch && c.tags && Array.isArray(c.tags) && c.tags.length > 0) {
      tagsHtml = `
        <div style="font-size:12px; color:var(--muted);">
          Štítky: <span style="color:var(--accent)">#${c.tags.join(', ')}</span>
        </div>
      `;
    }

    return `
      <div class="case-card ${newClass}" onclick="router.go('case', '${c.id}')" style="display: flex; flex-direction: column; align-items: center; text-align: center;">
        ${visualContent}
        <h3 style="margin:0; font-size: 20px;">${c.name}</h3>
        
        ${c.type !== 'collection' ? `
          <div style="font-size:12px; color:var(--muted); margin-top: 8px;">
            Bedna série č. <span style="color:var(--text)">${c.series || 'Neznámé'}</span>
          </div>
        ` : ''}

        <div style="font-size:12px; color:var(--muted); ${c.type === 'collection' ? 'margin-top: 8px;' : ''}">
          Datum vydání: <span style="color:var(--text)">${c.release || 'Neznámý'}</span>
        </div>
          ${tagsHtml}
        </div>
    `;
  }).join('');
}

function showResultsModal() {
  if (particles && typeof particles.clear === 'function') {
    particles.clear();
  }
  
  const list = document.getElementById('resultsList');
  
  const isCapsule = state.activeCase && state.activeCase.type === 'capsule';
  const isPackage = state.activeCase && state.activeCase.type === 'package';
  
  list.innerHTML = state.lastResults.map(r => {
    let wear = r.float;
    let pattern = r.pattern || Math.floor(Math.random() * 1000) + 1;

    if (wear === undefined) {
      const min = (r.minFloat !== undefined) ? r.minFloat : 0.00;
      const max = (r.maxFloat !== undefined) ? r.maxFloat : 1.00;
      
      const roll = Math.random() * 100;
      let globalWear = 0;
      if (roll <= 3) globalWear = Math.random() * 0.07;
      else if (roll <= 27) globalWear = 0.07 + Math.random() * (0.15 - 0.07);
      else if (roll <= 60) globalWear = 0.15 + Math.random() * (0.38 - 0.15);
      else if (roll <= 84) globalWear = 0.38 + Math.random() * (0.45 - 0.38);
      else globalWear = 0.45 + Math.random() * (1.00 - 0.45);

      wear = min + (globalWear * (max - min));
    }

    const wearFixed = wear.toFixed(9);

    let wearName = "";
    if (wear <= 0.07) wearName = "Zbrusu nový";
    else if (wear <= 0.15) wearName = "Lehce opotřebený";
    else if (wear <= 0.38) wearName = "Opotřebený";
    else if (wear <= 0.45) wearName = "Silně opotřebený";
    else wearName = "Poničený bojem";

    let rarityLabel = DATA.rarities[r.rarity].label;
    const rarityColor = DATA.rarities[r.rarity].color;

    // Speciální labely pro kapsle
    if (isCapsule) {
       if (r.rarity === 'blue') rarityLabel = 'Vyšší třída';
       else if (r.rarity === 'purple') rarityLabel = 'Významná';
       else if (r.rarity === 'pink') rarityLabel = 'Exotická';
       else if (r.rarity === 'red') rarityLabel = 'Mimořádná';
    }

    const isKnife = r.rarity === 'gold' || r.name.includes('★');
    const showWear = !isCapsule || isKnife;

    const wearInfoHtml = !showWear ? '' : `
      <div style="font-size:12px; color: var(--muted); line-height: 1.4; margin-top: 4px;">
        <div>Číslo šablony vzorku: <strong>${pattern}</strong></div>
        <div>Opotřebení: <strong>${wearFixed}</strong></div>
        <div>Povrch: <strong>${wearName}</strong></div>
      </div>
    `;

    let visualHtml = '';
    if (r.image) {
      visualHtml = `<img src="${r.image}" style="height: auto; display: block;">`;
    } else {
      let icon = '🔫';
      if (isKnife) icon = '🔪';
      else if (r.name.toLowerCase().includes('rukavice')) icon = '🧤';
      else if (isCapsule) icon = '🏷️';
      else if (isPackage) icon = '📦';
      visualHtml = `<span style="font-size: 40px;">${icon}</span>`;
    }

    const souvenirPrefix = isPackage ? '<span style="color:#ffd700">Souvenir </span>' : '';

    const [weaponName, skinName] = r.name.includes('|') 
  ? r.name.split('|').map(s => s.trim()) 
  : [r.name, ''];

return `
  <div class="result-card" style="width: 230px; display: flex; flex-direction: column; gap: 8px; margin: 10px; flex-shrink: 0;">
  
  <div class="result-card-visual" style="position: relative; width: 100%; height: 160px; background: linear-gradient(0deg, ${rarityColor}22 0%, rgba(0,0,0,0) 100%); border-bottom: 5px solid ${rarityColor}; display: flex; align-items: center; justify-content: center; padding: 4px; overflow: hidden;">
  <div style="position: absolute; top: 16px; left: 23px; width: 80%; height: 80%; background: url('${r.image}') center/contain no-repeat; filter: blur(15px); opacity: 0.3; z-index: 0;"></div>

    <div style="position: absolute; top: 6px; left: 6px; font-size: 10px; font-weight: 800; color: ${rarityColor}; text-transform: uppercase; z-index: 2; opacity: 0.9; letter-spacing: 0.5px;">
      ${rarityLabel}
    </div>

    <div style="width: 80%; height: 80%; display: flex; align-items: center; justify-content: center; z-index: 1; position: relative;">
      ${visualHtml.replace('style="', 'style="max-width: 100%; max-height: 100%;')}
    </div>
  </div>

  <div class="result-card-info" style="text-align: left;">
    <div style="font-size: 16px; font-weight: 700; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
      ${souvenirPrefix}${weaponName}
    </div>
    <div style="font-size: 14px; font-weight: 400; color: #bbb; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
      ${skinName}
    </div>
    <div style="margin-top: 10px;">
      ${wearInfoHtml}
    </div>
  </div>

</div>`;
  }).join('');
  
  const modal = document.getElementById('modalOverlay');
  modal.style.display = 'flex';
  modal.classList.remove('closing');
  
  state.lastResults.forEach((r, idx) => {
    const color = DATA.rarities[r.rarity].color;
    setTimeout(() => {
      particles.burst(window.innerWidth/2, window.innerHeight/2, color, 80);
    }, idx * 150);
  });
}

function updateCounterUI() {
  const btn = document.getElementById('openBtn');
  const count = state.openCount;
  
  if (!state.isSpinning) {
    btn.classList.remove('btn-red');
    btn.disabled = false;

    let buttonText = "";
    if (count === 1) buttonText = "Otevřít bednu";
    else if (count >= 2 && count <= 4) buttonText = `Otevřít ${count} bedny`;
    else buttonText = `Otevřít ${count} beden`;
    
    btn.innerText = buttonText;
    
    if (document.getElementById('decBtn')) document.getElementById('decBtn').disabled = (count <= 1);
    if (document.getElementById('incBtn')) document.getElementById('incBtn').disabled = (count >= 5);
  }
  
  const countVal = document.getElementById('countVal');
  if (countVal) countVal.innerText = count;
}

function closeModal() {
  const modal = document.getElementById('modalOverlay');
  modal.classList.add('closing');
  setTimeout(() => {
    modal.style.display = 'none';
    modal.classList.remove('closing');
  }, 400);
  audio.playMenuBack();
}
/*-------------------------
INIT
------------------------- */
document.getElementById('incBtn').onclick = () => { 
  if (!state.isSpinning) { 
    state.openCount = Math.min(5, state.openCount + 1); 
    updateCounterUI();
    router.initSpinners();
    audio.playMenuFilterChange();
  } 
};

document.getElementById('decBtn').onclick = () => { 
  if (!state.isSpinning) { 
    state.openCount = Math.max(1, state.openCount - 1); 
    updateCounterUI();
    router.initSpinners();
    audio.playMenuFilterChange();
  } 
};
document.getElementById('openBtn').onclick = handleOpen;
document.getElementById('searchInput').addEventListener('input', handleFilterChange);

document.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    return;
  }

  if (e.repeat) return;

  if (['1', '2', '3', '4', '5'].includes(e.key)) {
    if (document.activeElement && document.activeElement.id === 'searchInput') return;

    if (!state.isSpinning) {
      const newCount = parseInt(e.key);
      
      if (state.openCount !== newCount) {
        state.openCount = newCount;
        updateCounterUI();
        
        const casePage = document.getElementById('view-case');
        if (casePage && window.getComputedStyle(casePage).display !== 'none' && state.activeCase) {
          router.initSpinners();
        }
        
        audio.playMenuFilterChange();
      }
    }
  }

  const modal = document.getElementById('modalOverlay');

  const isModalVisible = modal && window.getComputedStyle(modal).display !== 'none' && !modal.classList.contains('closing');

  const casePage = document.getElementById('view-case');
  const isCasePageVisible = casePage && window.getComputedStyle(casePage).display !== 'none';

  if (e.key === 'Enter') {
    e.preventDefault();
    
    if (document.activeElement) document.activeElement.blur();

    if (isModalVisible) {
      if (typeof closeModal === 'function') closeModal();
    } else if (isCasePageVisible) {
      handleOpen();
    }
  }

  if (e.key === 'Escape' || e.key === 'Esc') {
    e.preventDefault();
    
    if (isModalVisible) {
      if (typeof closeModal === 'function') closeModal();
    } 
    else if (state.isSpinning) {
      state.isSkipping = true;
    } 
    else if (isCasePageVisible) {
      if (typeof router !== 'undefined' && typeof router.go === 'function') {
        router.go('home');
      }
    }
  }
});

document.addEventListener('mousedown', () => {
  setTimeout(() => {
    if (document.activeElement && document.activeElement.tagName === 'BUTTON') {
      document.activeElement.blur();
    }
  }, 1);
});

renderCases(DATA.cases);

audio.init();
particles.init();
router.go('home');
window.addEventListener('resize', () => {
  particles.canvas.width = window.innerWidth;
  particles.canvas.height = window.innerHeight;
  state.instances.forEach(s => { s.resize(); s.draw(); });
});
